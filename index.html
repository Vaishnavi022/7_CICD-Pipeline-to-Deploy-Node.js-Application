<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 CI/CD Pipeline App</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
  }

  .container {
    padding: 40px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
  }

  input {
    width: 90%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin: 10px 0;
    font-size: 14px;
  }

  button {
    background: #ff7eb3;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
  }

  button:hover {
    background: #ff4e91;
    transform: scale(1.1);
  }

  #output {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
  }

  .status {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.9;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>

<body>

<div class="container">

  <h1>🚀 CI/CD Pipeline Dashboard</h1>
  <p>⚡ Auto Deployment with AWS</p>

  <div class="card">

    <h2>🎉 Deployment Successful</h2>
    <p>✅ Your pipeline is working perfectly!</p>

    <input type="text" id="nameInput" placeholder="👤 Enter your name">

    <br>

    <button onclick="showMessage()">🚀 Test Now</button>

    <div id="output"></div>

    <div class="status">
      🌐 Deployed on: Amazon S3 <br>
      🔄 Auto Trigger: Enabled <br>
      ⚙️ CI/CD: Active
    </div>

  </div>

</div>

<script>
function showMessage() {
  const name = document.getElementById("nameInput").value;

  if (name === "") {
    document.getElementById("output").innerText = "⚠️ Please enter your name!";
  } else {
    document.getElementById("output").innerText =
      "👋 Hello " + name + "! 🎉 CI/CD is working perfectly 🚀🔥";
  }
}
</script>

</body>
</html>
